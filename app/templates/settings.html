<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ethernet Network Settings</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: #e5e7eb;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  width: 520px;
  background: #020617;
  border-radius: 18px;
  padding: 32px;
  box-shadow: 0 30px 60px rgba(0,0,0,.6);
}

h2 { text-align: center; margin-bottom: 24px; }

.section { margin-bottom: 24px; }

.section-title {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #38bdf8;
  margin-bottom: 12px;
}

.field { margin-bottom: 16px; }

.row { display: flex; gap: 12px; }

label {
  font-size: 13px;
  color: #94a3b8;
  display: block;
  margin-bottom: 6px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #0b1220;
  color: #e5e7eb;
  font-size: 14px;
}

input.error { border-color: #ef4444; }

.error-text {
  font-size: 12px;
  color: #ef4444;
  margin-top: 4px;
}

.status {
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  display: inline-block;
}

.connected {
  background: #052e16;
  color: #22c55e;
}

.disconnected {
  background: #450a0a;
  color: #ef4444;
}

.actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

button {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: #38bdf8;
  color: #020617;
  font-weight: 600;
}

.btn-primary:disabled {
  opacity: .6;
  cursor: not-allowed;
}

.btn-secondary {
  background: transparent;
  border: 1px solid #1e293b;
  color: #94a3b8;
}

.loading {
  text-align: center;
  font-size: 13px;
  margin-top: 10px;
  color: #38bdf8;
}
</style>
</head>

<body>

<div class="card">
  <h2>Ethernet Network Settings</h2>

  <!-- STATUS -->
  <div class="section">
    <div class="section-title">Connection Status</div>
    <div id="connectionStatus" class="status disconnected">
      Checking...
    </div>
  </div>

  <!-- IP MODE -->
  <div class="section">
    <div class="section-title">IP Configuration</div>

    <div class="field">
      <label>IP Assignment</label>
      <select id="ipMode">
        <option value="dhcp">Automatic (DHCP)</option>
        <option value="static">Manual (Static)</option>
      </select>
    </div>

    <div id="staticFields" style="display:none;">
      <div class="row">
        <div class="field">
          <label>Static IP</label>
          <input id="staticIp" placeholder="192.168.1.50">
          <div id="ipError" class="error-text"></div>
        </div>
        <div class="field">
          <label>Gateway</label>
          <input id="gateway" placeholder="192.168.1.1">
          <div id="gwError" class="error-text"></div>
        </div>
      </div>

      <div class="field">
        <label>DNS (optional)</label>
        <input id="dns" placeholder="8.8.8.8">
      </div>
    </div>
  </div>

  <!-- TARGET URL -->
  <div class="section">
    <div class="section-title">Site Load URL</div>
    <div class="field">
      <label>Target URL</label>
      <input id="targetUrl" placeholder="http://192.168.1.10">
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="applyBtn">Apply Settings</button>
    <button class="btn-secondary" onclick="window.location.href='/'">Cancel</button>
  </div>

  <div id="loadingText" class="loading" style="display:none">
    Applying settings... Device may reconnect.
  </div>
</div>

<script>

const ipMode = document.getElementById("ipMode");
const staticFields = document.getElementById("staticFields");
const applyBtn = document.getElementById("applyBtn");
const loadingText = document.getElementById("loadingText");
const connectionStatus = document.getElementById("connectionStatus");

const staticIp = document.getElementById("staticIp");
const gateway = document.getElementById("gateway");
const dns = document.getElementById("dns");
const targetUrl = document.getElementById("targetUrl");

const ipError = document.getElementById("ipError");
const gwError = document.getElementById("gwError");

// Toggle visibility
function updateVisibility() {
  staticFields.style.display =
    ipMode.value === "static" ? "block" : "none";
}

// Validate IPv4 (accepts with or without CIDR)
function isValidIp(ip) {
  if (!ip) return false;
  const cleanIp = ip.includes("/") ? ip.split("/")[0] : ip;

  const regex =
    /^(25[0-5]|2[0-4]\d|1\d\d|\d\d|\d)\.(25[0-5]|2[0-4]\d|1\d\d|\d\d|\d)\.(25[0-5]|2[0-4]\d|1\d\d|\d\d|\d)\.(25[0-5]|2[0-4]\d|1\d\d|\d\d|\d)$/;

  return regex.test(cleanIp);
}

function validate() {
  let valid = true;

  ipError.textContent = "";
  gwError.textContent = "";

  staticIp.classList.remove("error");
  gateway.classList.remove("error");

  if (ipMode.value === "static") {

    if (!isValidIp(staticIp.value)) {
      ipError.textContent = "Invalid IP address";
      staticIp.classList.add("error");
      valid = false;
    }

    if (!isValidIp(gateway.value)) {
      gwError.textContent = "Invalid gateway";
      gateway.classList.add("error");
      valid = false;
    }
  }

  return valid;
}

// Load config
async function loadConfig() {
  const res = await fetch("/api/config");
  const cfg = await res.json();

  ipMode.value = cfg.ip_mode || "dhcp";
  staticIp.value = (cfg.static_ip || "").split("/")[0];
  gateway.value = cfg.gateway || "";
  dns.value = cfg.dns || "";
  targetUrl.value = cfg.target_url || "";

  updateVisibility();
}

// Load status (polling)
async function loadStatus() {
  try {
    const res = await fetch("/api/network/status");
    const data = await res.json();

    if (data.connected) {
      connectionStatus.textContent =
        "Connected (" + data.device + ")";
      connectionStatus.className = "status connected";
    } else {
      connectionStatus.textContent = "Disconnected";
      connectionStatus.className = "status disconnected";
    }
  } catch {
    connectionStatus.textContent = "Unknown";
  }
}

// Apply settings
async function applySettings() {

  if (!validate()) return;

  let ipValue = staticIp.value;

  if (ipMode.value === "static" && ipValue && !ipValue.includes("/")) {
    ipValue = ipValue + "/24";
  }

  const cfg = {
    network_type: "ethernet",
    ip_mode: ipMode.value,
    static_ip: ipValue,
    gateway: gateway.value,
    dns: dns.value,
    target_url: targetUrl.value
  };

  try {
    applyBtn.disabled = true;
    loadingText.style.display = "block";

    await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cfg)
    });

    await fetch("/api/network/apply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cfg)
    });

    alert("Settings applied successfully.");

  } catch {
    alert("Failed to apply settings.");
  } finally {
    applyBtn.disabled = false;
    loadingText.style.display = "none";
  }
}

ipMode.addEventListener("change", updateVisibility);
applyBtn.addEventListener("click", applySettings);

loadConfig();
loadStatus();
setInterval(loadStatus, 3000);  // live status refresh

</script>

</body>
</html>
