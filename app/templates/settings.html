<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ethernet Network Settings</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: #e5e7eb;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  width: 520px;
  background: #020617;
  border-radius: 18px;
  padding: 32px;
  box-shadow: 0 30px 60px rgba(0,0,0,.6);
}

h2 {
  margin: 0 0 24px 0;
  text-align: center;
  font-weight: 600;
}

.section {
  margin-bottom: 24px;
}

.section-title {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #38bdf8;
  margin-bottom: 14px;
}

.field {
  margin-bottom: 16px;
}

.row {
  display: flex;
  gap: 12px;
}

.field label {
  display: block;
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 6px;
}

.field input,
.field select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #0b1220;
  color: #e5e7eb;
  font-size: 14px;
}

.field input:focus,
.field select:focus {
  outline: none;
  border-color: #38bdf8;
}

.status {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-top: 8px;
}

.status.connected {
  background: #052e16;
  color: #22c55e;
}

.status.disconnected {
  background: #450a0a;
  color: #ef4444;
}

.actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

button {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: #38bdf8;
  color: #020617;
  font-weight: 600;
}

.btn-primary:disabled {
  opacity: .6;
  cursor: not-allowed;
}

.btn-secondary {
  background: transparent;
  border: 1px solid #1e293b;
  color: #94a3b8;
}

.loading {
  text-align: center;
  font-size: 13px;
  margin-top: 10px;
  color: #38bdf8;
}
</style>
</head>

<body>

<div class="card">
  <h2>Ethernet Network Settings</h2>

  <!-- STATUS -->
  <div class="section">
    <div class="section-title">Connection Status</div>
    <div id="connectionStatus" class="status disconnected">
      Checking...
    </div>
  </div>

  <!-- IP MODE -->
  <div class="section">
    <div class="section-title">IP Configuration</div>

    <div class="field">
      <label>IP Assignment</label>
      <select id="ipMode">
        <option value="dhcp">Automatic (DHCP)</option>
        <option value="static">Manual (Static)</option>
      </select>
    </div>

    <div id="staticFields">
      <div class="row">
        <div class="field">
          <label>IP Address (CIDR)</label>
          <input id="piIp" placeholder="192.168.1.50/24">
        </div>
        <div class="field">
          <label>Gateway</label>
          <input id="gateway" placeholder="192.168.1.1">
        </div>
      </div>

      <div class="field">
        <label>DNS Server</label>
        <input id="dns" placeholder="8.8.8.8">
      </div>
    </div>
  </div>

  <!-- DISPLAY URL -->
  <div class="section">
    <div class="section-title">Device URL</div>
    <div class="field">
      <label>Access URL</label>
      <input id="displayUrl" readonly>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn-primary" id="applyBtn">Apply Settings</button>
    <button class="btn-secondary" onclick="window.location.href='/'">Cancel</button>
  </div>

  <div id="loadingText" class="loading" style="display:none">
    Applying settings... Device may reconnect.
  </div>
</div>

<script>

const ipMode = document.getElementById("ipMode");
const staticFields = document.getElementById("staticFields");
const applyBtn = document.getElementById("applyBtn");
const loadingText = document.getElementById("loadingText");
const connectionStatus = document.getElementById("connectionStatus");


function updateVisibility() {
  staticFields.style.display =
    ipMode.value === "static" ? "block" : "none";
}


// ===============================
// LOAD STATUS
// ===============================
async function loadStatus() {
  try {
    const res = await fetch("/api/network/status");
    const data = await res.json();

    if (data.connected) {
      connectionStatus.textContent =
        "Connected (" + data.device + ")";
      connectionStatus.className = "status connected";
    } else {
      connectionStatus.textContent = "Disconnected";
      connectionStatus.className = "status disconnected";
    }

  } catch {
    connectionStatus.textContent = "Unknown";
  }
}


// ===============================
// LOAD DISPLAY URL
// ===============================
async function loadDisplayUrl() {
  try {
    const res = await fetch("/api/network/ip");
    const data = await res.json();

    if (data.ip) {
      const ip = data.ip.split("/")[0];
      document.getElementById("displayUrl").value =
        "http://" + ip + ":8000";
    }

  } catch {}
}


// ===============================
// APPLY SETTINGS
// ===============================
async function applySettings() {

  const cfg = {
    ip_mode: ipMode.value,
    pi_ip: document.getElementById("piIp").value,
    gateway: document.getElementById("gateway").value,
    dns: document.getElementById("dns").value
  };

  try {
    applyBtn.disabled = true;
    loadingText.style.display = "block";

    await fetch("/api/network/apply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cfg)
    });

    alert("Settings applied. If IP changed, reconnect using new URL.");

  } catch (err) {
    alert("Failed to apply settings.");
  } finally {
    applyBtn.disabled = false;
    loadingText.style.display = "none";
  }
}


ipMode.addEventListener("change", updateVisibility);
applyBtn.addEventListener("click", applySettings);

updateVisibility();
loadStatus();
loadDisplayUrl();

</script>

</body>
</html>
